name: Pruebas unitarias - MediTurnos

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Ejecutar tests con JUnit 5
    runs-on: ubuntu-latest

    steps:

      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar el proyecto y ejecutar tests
        run: mvn test

      - name: Mostrar resultado de los tests
        if: always()
        run: |
          echo "Tests finalizados"
          find . -name "*.xml" -path "*/surefire-reports/*" | xargs cat 2>/dev/null || echo "No se encontraron reportes XML"
